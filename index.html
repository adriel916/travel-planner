<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adriel & Jenny — 2026 Travels</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f2; --surface: #ffffff; --border: #e8e5de;
      --text: #1c1b18; --muted: #7a7870; --hint: #b0ada5;
      --green: #3d6b4f; --green-light: #eef4f0; --green-mid: #c0d8c8;
      --amber: #8a6a2e; --amber-light: #fdf6e8; --amber-mid: #edd9a0;
      --blue: #2e5a8a; --blue-light: #edf2fa; --blue-mid: #b5cce8;
      --live: #2a7a4b; --live-light: #e6f4ec;
      --red: #a03030; --red-light: #faeaea; --red-mid: #f0b8b8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161513; --surface: #1e1d1a; --border: #2c2a26;
        --text: #e6e3dc; --muted: #888580; --hint: #585550;
        --green: #7ab892; --green-light: #182818; --green-mid: #2a4835;
        --amber: #c49040; --amber-light: #201808; --amber-mid: #3a2808;
        --blue: #6899cc; --blue-light: #0c1e32; --blue-mid: #183050;
        --live: #58b875; --live-light: #0c2018;
        --red: #d06060; --red-light: #280c0c; --red-mid: #480c0c;
      }
    }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 36px 16px 72px;
      font-weight: 300; line-height: 1.5;
    }
    .wrap { max-width: 520px; margin: 0 auto; }
    header { padding-bottom: 28px; }
    .eye { font-size: 10px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: var(--hint); margin-bottom: 10px; }
    h1 { font-family: 'DM Serif Display', Georgia, serif; font-size: 32px; font-weight: 400; line-height: 1.1; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--muted); }
    .rule { height: 1px; background: var(--border); margin-bottom: 20px; }
    .list { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--border); display: flex; flex-direction: column; gap: 1px; }
    .card { background: var(--surface); position: relative; }
    .card.next::after { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--green); }
    .row { padding: 15px 18px 15px 20px; display: flex; align-items: center; gap: 13px; cursor: pointer; user-select: none; }
    .row:hover { background: var(--bg); }
    .badge { width: 38px; height: 38px; border-radius: 9px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; border: 1px solid var(--border); }
    .meta { flex:1; min-width:0; }
    .name { font-size:13.5px; font-weight:500; color:var(--text); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .date { font-size:12px; color:var(--muted); margin-top:2px; font-weight:300; }
    .t-next { font-size:10px; font-weight:500; letter-spacing:.07em; text-transform:uppercase; background:var(--green-light); color:var(--green); padding:2px 8px; border-radius:99px; white-space:nowrap; border:1px solid var(--green-mid); }
    .t-days { font-size:12px; color:var(--hint); white-space:nowrap; font-weight:300; }
    .t-pass { font-size:10px; font-weight:500; background:var(--amber-light); color:var(--amber); padding:2px 7px; border-radius:99px; border:1px solid var(--amber-mid); }
    .chev { font-size:10px; color:var(--hint); transition:transform .2s; flex-shrink:0; }
    .chev.open { transform:rotate(180deg); }
    .body { border-top:1px solid var(--border); padding:18px 20px; display:none; }
    .body.open { display:block; }
    .lbl { font-size:10px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--hint); margin-bottom:8px; }
    .sublbl { font-size:10px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:var(--hint); opacity:.65; margin-bottom:5px; margin-top:0; }
    .live-tag { font-size:9px; font-weight:500; letter-spacing:.06em; text-transform:uppercase; background:var(--live-light); color:var(--live); padding:1px 6px; border-radius:99px; margin-left:4px; }
    .forecast-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(58px,1fr)); gap:6px; margin-bottom:18px; }
    .day-c { background:var(--bg); border-radius:10px; padding:9px 4px; text-align:center; border:1px solid var(--border); }
    .d-name { font-size:10px; color:var(--hint); margin-bottom:4px; font-weight:500; letter-spacing:.05em; text-transform:uppercase; }
    .d-ico { font-size:20px; margin-bottom:4px; }
    .d-hi { font-size:13px; font-weight:500; }
    .d-rain { font-size:10px; color:var(--blue); margin-top:3px; }
    .wrow { display:flex; gap:13px; margin-bottom:18px; align-items:flex-start; }
    .wico { font-size:26px; line-height:1; margin-top:3px; }
    .wsumm { font-size:13.5px; line-height:1.55; font-weight:300; }
    .wtemp { font-size:12px; color:var(--muted); margin-top:3px; }
    .wnote { font-size:10px; color:var(--hint); font-weight:300; }
    .sep { height:1px; background:var(--border); margin:16px 0; }
    /* Venue block */
    .venue { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:16px; }
    .venue-lbl { font-size:10px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--hint); margin-bottom:8px; }
    .venue-row { display:flex; gap:8px; align-items:flex-start; margin-bottom:6px; }
    .venue-row:last-child { margin-bottom:0; }
    .venue-dot { font-size:13px; flex-shrink:0; margin-top:1px; }
    .venue-info { font-size:13px; font-weight:300; line-height:1.5; }
    .venue-name { font-weight:500; color:var(--text); }
    .venue-addr { color:var(--muted); font-size:12px; }
    .venue-time { font-size:11px; color:var(--green); font-weight:500; margin-top:2px; }
    /* Dress code */
    .dress { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:16px; }
    .dress-lbl { font-size:10px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--hint); margin-bottom:7px; }
    .dress-text { font-size:13px; font-weight:300; line-height:1.6; }
    .palette { display:flex; gap:7px; margin-top:10px; flex-wrap:wrap; align-items:center; }
    .sw { width:26px; height:26px; border-radius:50%; border:1px solid rgba(0,0,0,0.1); flex-shrink:0; cursor:default; }
    .avoid-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
    .avoid { font-size:11px; font-weight:400; background:var(--red-light); color:var(--red); border:1px solid var(--red-mid); padding:2px 9px; border-radius:99px; }
    /* Pack chips */
    .chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
    .chip { font-size:12px; font-weight:300; background:var(--bg); color:var(--text); padding:4px 11px; border-radius:99px; border:1px solid var(--border); }
    .chip.e { background:var(--blue-light); color:var(--blue); border-color:var(--blue-mid); }
    .tip { font-size:13px; font-weight:300; font-style:italic; color:var(--muted); line-height:1.65; }
    footer { text-align:center; font-size:11px; color:var(--hint); margin-top:36px; letter-spacing:.05em; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eye">2026 Travel Planner</div>
    <h1>Adriel & Jenny</h1>
    <p class="sub">8 trips this year · Tap any card for details</p>
  </header>
  <div class="rule"></div>
  <div class="list" id="L"></div>
  <footer>Updated March 2026</footer>
</div>
<script>
function ri(p){return p>=70?"🌧️":p>=40?"🌦️":p>=15?"⛅":"☀️";}
function dl(d){if(d<=0)return"Now";if(d<7)return`In ${d} days`;const w=Math.round(d/7);return`~${w} wk${w>1?'s':''}`;}

const T=[
  {id:"sd",name:"San Diego, CA",emoji:"🌊",bg:"#e8f3fc",dl:"Mar 20–21",du:3,ni:1,nx:true,pp:false,
   live:true,forecast:[{day:"Fri",high:77,rain:0},{day:"Sat",high:73,rain:10}],
   w:{icon:"☀️",summ:"Sunny and warm with a light ocean breeze — perfect weekend weather",temp:"73–77°F"},
   ess:["Sunscreen","Sunglasses","Comfortable walking shoes"],
   clo:["Light t-shirts","Shorts or casual pants","Light jacket for evenings"],
   ext:["Beach towel","Camera","Swimsuit"],
   tip:"The Gaslamp Quarter is great for Saturday night — good food within walking distance of the waterfront."},

  {id:"sea",name:"Seattle, WA",emoji:"🌧️",bg:"#eaf2e4",dl:"Mar 26–30",du:9,ni:4,nx:false,pp:false,
   live:true,forecast:[{day:"Thu",high:54,rain:75},{day:"Fri",high:56,rain:45},{day:"Sat",high:49,rain:20}],
   w:{icon:"🌦️",summ:"Cool and rainy — very typical Seattle late March",temp:"49–56°F"},
   ess:["Umbrella","Rain jacket","Waterproof shoes"],
   clo:["Layers (sweaters, long sleeves)","Jeans or pants","Warm socks"],
   ext:["Reusable coffee cup","Portable charger","Day bag"],
   tip:"Grab a coffee at Pike Place Market and walk the waterfront between sessions — a Seattle classic."},

  {id:"yj",name:"Rachel & YJ Wedding",emoji:"🌿",bg:"#eef5f0",dl:"Apr 4",du:18,ni:1,nx:false,pp:false,
   live:false,
   w:{icon:"🌸",summ:"Warm sunny spring day on the Malibu coast — beautiful outdoor weather",temp:"65–72°F (cooler in the evening)"},
   venues:[{icon:"⛪",name:"Calamigos Ranch – The Birchwood Room",addr:"327 Latigo Canyon Rd, Malibu, CA 90265",time:""}],
   dc:{desc:"Semi-formal or formal attire. Guests are welcome to wear greens or other soft spring colors like sage and pastels. April evenings may be chilly — bring a light jacket or cardigan. Heaters will be available during the reception.",
       pal:[{c:"#a8c9a0",l:"Sage"},{c:"#b3d4a8",l:"Spring green"},{c:"#c8e8c0",l:"Mint"},{c:"#d4c5e8",l:"Lavender"},{c:"#f0d8d0",l:"Blush"}],avoid:[]},
   ess:["Semi-formal or formal outfit","Light jacket or cardigan","Dress shoes"],
   clo:["Sage, pastels or spring greens welcome","Elegant dress or suit","Comfortable heels or dress shoes"],
   ext:["Camera","Wedding card","Wrap for the evening"],
   tip:"Calamigos Ranch is stunning — the canyon views at golden hour are incredible. Bring a wrap for the outdoor reception."},

  {id:"kw",name:"Kirkwood / Carson Pass",emoji:"🏔️",bg:"#faeeda",dl:"Apr 25",du:39,ni:1,nx:false,pp:false,
   live:false,
   w:{icon:"🌨️",summ:"Cool with possible snow patches at 8,200 ft elevation",temp:"45–55°F (mornings near 30°F)"},
   ess:["High SPF sunscreen","UV sunglasses","Microspikes or traction cleats"],
   clo:["Moisture-wicking base layer","Fleece mid-layer","Waterproof hiking boots","Beanie & gloves"],
   ext:["Hiking poles","Extra snacks & water","Camera for the views"],
   tip:"Take it slow the first 30 minutes — Carson Pass is above 8,000 ft and altitude hits harder than expected."},

  {id:"sw",name:"Sandra & Vienh Wedding",emoji:"🤍",bg:"#f5f4f2",dl:"May 17",du:61,ni:1,nx:false,pp:true,
   live:false,
   w:{icon:"🌤️",summ:"Cool and pleasant with mild sunshine, possible light rain",temp:"58–66°F"},
   venues:[
     {icon:"⛪",name:"Grandview Tagalog Kingdom Hall",addr:"3280 Grandview Highway, Vancouver, BC V5M 2G2",time:"Ceremony · 3:00 PM"},
     {icon:"🎉",name:"The Polygon Gallery",addr:"101 Carrie Cates Court, North Vancouver, BC V7M 3J4",time:"Reception · 5:30 PM"}
   ],
   dc:{desc:"An evening of romance and timeless black-tie style — elegant black attire requested.",
       pal:[{c:"#1a1a1a",l:"Black"},{c:"#2d2d2d",l:"Onyx"},{c:"#3e3e3e",l:"Charcoal"}],avoid:[]},
   ess:["Passport","Elegant black attire","Formal shoes"],
   clo:["Black formal gown or tuxedo","Black tie accessories","Elegant black heels or oxfords"],
   ext:["Wedding card","Clutch or small bag","Wrap or stole"],
   tip:"Black tie in Canada — dry-clean your outfit before the trip so it arrives crisp and ready."},

  {id:"jw",name:"Jomar & Chloe Wedding",emoji:"💚",bg:"#eef5f0",dl:"Jun 7",du:82,ni:1,nx:false,pp:true,
   live:false,
   w:{icon:"🌤️",summ:"Mild and mostly sunny with occasional brief showers",temp:"62–72°F"},
   venues:[
     {icon:"⛪",name:"Kingdom Hall of Jehovah's Witnesses",addr:"11014 Westminster Hwy, Richmond, BC V6X 1B3",time:"Ceremony · 3:30–4:30 PM"},
     {icon:"🎉",name:"The Westin Wall Centre Vancouver Airport",addr:"3099 Corvette Way, Richmond, BC V6X 4K3",time:"Reception · 6:00 PM – 12:00 AM"}
   ],
   dc:{desc:"Modest formal attire requested. The colour palette is for inspiration — please refrain from wearing white/cream colours and grey suits.",
       pal:[{c:"#b8d4a0",l:"Light sage"},{c:"#a0c878",l:"Bright sage"},{c:"#7aaa5a",l:"Teal sage"},{c:"#4a6a38",l:"Deep green"}],
       avoid:["White / cream","Grey suits"]},
   ess:["Passport","Formal attire in palette tones","Dress shoes"],
   clo:["Greens, sage or muted earth tones","Modest formal dress or suit","Covered necklines/shoulders"],
   ext:["Gift or card","Camera","Light layer for evening"],
   tip:"Stick to the greens palette — sage, olive and deep green are all in. Avoid grey suits and anything white or cream."},

  {id:"nw",name:"Nini's Wedding — Victoria, BC",emoji:"🌸",bg:"#f0eefe",dl:"Jun 12–14",du:87,ni:3,nx:false,pp:true,
   live:false,
   w:{icon:"🌸",summ:"Mild and sunny — Victoria in peak June bloom",temp:"58–70°F"},
   venues:[
     {icon:"⛳",name:"Olympic View Room, Olympic View Golf Club",addr:"643 Latoria Rd, Victoria, BC",time:"Ceremony · 10:30 AM · Friday Jun 12"}
   ],
   dc:{desc:"John & Nini's colour palette — greens and earth tones are welcomed. Please refrain from wearing yellow, blue or beige.",
       pal:[{c:"#b8d4a8",l:"Sage"},{c:"#a8d488",l:"Light green"},{c:"#78b870",l:"Mint teal"},{c:"#4a6840",l:"Deep green"}],
       avoid:["Yellow","Blue","Beige"]},
   ess:["Passport","Formal attire in green/earth tones","Comfortable walking shoes"],
   clo:["Wedding outfit in palette tones","Smart-casual for extra days","Light jacket for evenings"],
   ext:["Visit Butchart Gardens","Afternoon tea at The Empress","Camera for the harbour"],
   tip:"Victoria in June is stunning — if you have extra time, Butchart Gardens and the Inner Harbour are absolutely worth it."},

  {id:"ec",name:"Quito, Ecuador",emoji:"🌿",bg:"#eaf2e4",dl:"Aug 1–9",du:136,ni:9,nx:false,pp:true,
   live:false,
   w:{icon:"🌤️",summ:"Dry season — mild days, strong equatorial sun and cool evenings",temp:"Days 63–66°F · Evenings 46–50°F"},
   venues:[
     {icon:"🏨",name:"Hampton by Hilton Quito La Carolina Park",addr:"Quito, Ecuador",time:"Aug 1–9 · 9 nights"}
   ],
   ess:["Passport","High SPF sunscreen (equatorial UV is extreme)","Altitude remedy (ask doctor about Diamox)"],
   clo:["Light layers you can add/remove","Warm fleece for evenings","Comfortable walking shoes"],
   ext:["Day trip to Mitad del Mundo","Camera","Spanish phrasebook"],
   tip:"Quito sits at 9,350 ft — drink extra water, skip heavy meals and alcohol on day 1, and let your body adjust before doing anything strenuous."}
];

function buildVenues(venues){
  if(!venues||!venues.length)return'';
  const rows=venues.map(v=>`
    <div class="venue-row">
      <div class="venue-dot">${v.icon}</div>
      <div class="venue-info">
        <div class="venue-name">${v.name}</div>
        <div class="venue-addr">${v.addr}</div>
        ${v.time?`<div class="venue-time">${v.time}</div>`:''}
      </div>
    </div>`).join('');
  return`<div class="venue"><div class="venue-lbl">Venue</div>${rows}</div>`;
}

function buildDC(dc){
  if(!dc)return'';
  const pals=dc.pal.map(p=>`<div class="sw" style="background:${p.c}" title="${p.l}"></div>`).join('');
  const avoids=dc.avoid.length?`<div class="avoid-row">${dc.avoid.map(a=>`<span class="avoid">✕ ${a}</span>`).join('')}</div>`:'';
  return`<div class="dress"><div class="dress-lbl">Dress code</div><div class="dress-text">${dc.desc}</div><div class="palette">${pals}</div>${avoids}</div>`;
}

function buildBody(t){
  let wHTML='';
  if(t.live&&t.forecast){
    const days=t.forecast.map(f=>`<div class="day-c"><div class="d-name">${f.day}</div><div class="d-ico">${ri(f.rain)}</div><div class="d-hi">${f.high}°</div>${f.rain>0?`<div class="d-rain">${f.rain}% 💧</div>`:'<div class="d-rain" style="visibility:hidden">—</div>'}</div>`).join('');
    wHTML=`<div class="lbl">Live forecast <span class="live-tag">Live</span></div><div class="forecast-grid">${days}</div>`;
  } else {
    wHTML=`<div class="wrow"><div class="wico">${t.w.icon}</div><div><div class="lbl">Typical weather <span class="wnote">(forecast not yet available)</span></div><div class="wsumm">${t.w.summ}</div><div class="wtemp">${t.w.temp}</div></div></div>`;
  }
  const vHTML=buildVenues(t.venues);
  const dcHTML=buildDC(t.dc);
  const hasMeta=vHTML||dcHTML;
  return`${wHTML}${hasMeta?`<div class="sep"></div>${vHTML}${dcHTML}`:''}
<div class="sep"></div>
<div class="lbl" style="margin-bottom:9px">What to pack</div>
<div class="sublbl">Essentials</div>
<div class="chips">${t.ess.map(e=>`<span class="chip e">${e}</span>`).join('')}</div>
<div class="sublbl">Clothing</div>
<div class="chips">${t.clo.map(e=>`<span class="chip">${e}</span>`).join('')}</div>
<div class="sublbl">Extras</div>
<div class="chips" style="margin-bottom:12px">${t.ext.map(e=>`<span class="chip">${e}</span>`).join('')}</div>
<div class="sep"></div>
<div class="tip">💡 ${t.tip}</div>`;
}

function render(){
  const L=document.getElementById('L');
  T.forEach(t=>{
    const c=document.createElement('div');
    c.className='card'+(t.nx?' next':'');
    c.innerHTML=`<div class="row" onclick="tog('${t.id}')">
      <div class="badge" style="background:${t.bg}">${t.emoji}</div>
      <div class="meta">
        <div class="name">${t.name}${t.pp?' <span class="t-pass">🛂 Passport</span>':''}</div>
        <div class="date">${t.dl} · ${t.ni} night${t.ni>1?'s':''}</div>
      </div>
      ${t.nx?'<span class="t-next">Next up</span>':`<span class="t-days">${dl(t.du)}</span>`}
      <span class="chev" id="chev-${t.id}">▾</span>
    </div>
    <div class="body" id="body-${t.id}">${buildBody(t)}</div>`;
    L.appendChild(c);
  });
}

function tog(id){
  document.getElementById('body-'+id).classList.toggle('open');
  document.getElementById('chev-'+id).classList.toggle('open');
}

render();
tog('sd');
</script>
</body>
</html>
